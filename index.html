<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundry Hosted-Agent Sample Finder</title>
  <link rel="stylesheet" href="styles.css?v=20260718b" />
</head>
<body>
  <header class="app-header slim">
    <div class="wrap">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <span class="brand-name">Foundry Hosted-Agent Sample Finder</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="view-home" class="view home" aria-label="Find a hosted-agent sample">
      <div class="home-hero">
        <h1 class="home-title">What should your hosted agent do?</h1>
        <p class="home-sub">Describe it and get a runnable Azure AI Foundry hosted-agent sample to start from.</p>
        <div class="home-search">
          <span class="home-search-icon" aria-hidden="true">🔍</span>
          <input type="search" id="search" class="home-search-input" placeholder="Describe your goal, or some keywords…" aria-label="Describe your goal or search samples" autocomplete="off" />
          <button id="btnClear" class="home-search-clear" type="button" hidden aria-label="Clear search">✕</button>
          <button id="btnSmart" class="home-smart-btn" type="button" title="Let a deployed Foundry agent pick the best-fit sample">✨ Smart search</button>
        </div>
      </div>
      <div id="homeMain" class="home-main" aria-live="polite"></div>
    </section>
  </main>

  <footer class="app-footer wrap">
    <p>
      Data mirrors <code id="sourceRepo">microsoft-foundry/foundry-samples</code> ·
      <a id="rootLink" href="#" target="_blank" rel="noopener">open the samples folder ↗</a>
    </p>
  </footer>

  <!-- Canonical data is data/*.json (consumed by the VS Code extension). -->
  <!-- These generated shims let the page work when opened directly via file://. -->
  <script src="data/samples.js"></script>
  <script src="data/tree.js"></script>
  <!--
    Smart search backend selection:
    - On localhost, use the local dev proxy (tools/smart-search-proxy.py, :8178).
    - On any deployed host, use the cloud Functions proxy (managed identity).
    Either way, app.js falls back to offline keyword search if it's unreachable.
  -->
  <script>
    (function () {
      var host = location.hostname;
      var isLocal = host === "localhost" || host === "127.0.0.1" || host === "";
      if (!isLocal) {
        window.SF_SMART_PROXY = "https://sample-finder-proxy2-dz098b.azurewebsites.net/api";
      }
    })();
  </script>
  <script src="app.js?v=20260724a"></script>
</body>
</html>
