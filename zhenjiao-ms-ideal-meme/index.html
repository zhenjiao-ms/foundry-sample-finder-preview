<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundry Hosted-Agent Sample Finder</title>
  <link rel="stylesheet" href="styles.css?v=20260717b" />
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <div>
          <h1>Hosted-Agent Sample Finder</h1>
          <p class="tagline">Start from a Foundry base agent and stack building blocks — each shows which frameworks already have a sample.</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="tabs wrap" role="tablist" aria-label="Views">
    <button class="tab" id="tab-compose" role="tab" aria-selected="true" data-view="compose">🧩 Compose a kit</button>
    <button class="tab" id="tab-guided" role="tab" aria-selected="false" data-view="guided">🧭 Guide me to one</button>
    <button class="tab" id="tab-guide" role="tab" aria-selected="false" data-view="guide">Building blocks</button>
    <button class="tab" id="tab-browse" role="tab" aria-selected="false" data-view="browse">Browse all samples</button>
  </nav>

  <main class="wrap">
    <!-- Prototype A: Compose a starter kit (compositional) -->
    <section id="view-compose" class="view" aria-labelledby="tab-compose">
      <div id="composeApp" class="compose-app"></div>
    </section>

    <!-- Prototype B: Guided path to one sample -->
    <section id="view-guided" class="view" hidden aria-labelledby="tab-guided">
      <div id="guidedApp" class="guided-app"></div>
    </section>

    <!-- Guide (building-blocks) view -->
    <section id="view-guide" class="view" hidden aria-labelledby="tab-guide">
      <div id="guideTree" class="guide-tree"></div>
    </section>

    <!-- Browse view -->
    <section id="view-browse" class="view" hidden aria-labelledby="tab-browse">
      <div class="filters">
        <input type="search" id="search" class="search" placeholder="Search samples (title, description, tags)…" aria-label="Search samples" />
        <div class="filter-selects">
          <label>Framework <select id="f-framework"></select></label>
          <label>Protocol <select id="f-protocol"></select></label>
          <label>Category <select id="f-category"></select></label>
          <label>Level <select id="f-level"></select></label>
          <button id="btnClearFilters" class="btn btn-ghost btn-sm">Clear</button>
        </div>
      </div>
      <p class="browse-count" id="browseCount" aria-live="polite"></p>
      <div id="browseGrid" class="card-grid"></div>
    </section>
  </main>

  <footer class="app-footer wrap">
    <p>
      Data mirrors <code id="sourceRepo">microsoft-foundry/foundry-samples</code> ·
      <a id="rootLink" href="#" target="_blank" rel="noopener">open the samples folder ↗</a>
    </p>
  </footer>

  <!-- Canonical data is data/*.json (consumed by the VS Code extension). -->
  <!-- These generated shims let the page work when opened directly via file://. -->
  <script src="data/samples.js"></script>
  <script src="data/tree.js"></script>
  <!--
    Smart search backend selection:
    - On localhost, use the local dev proxy (tools/smart-search-proxy.py, :8178).
    - On any deployed host, use the cloud Functions proxy (managed identity).
    Either way, app.js falls back to offline keyword search if it's unreachable.
  -->
  <script>
    (function () {
      var host = location.hostname;
      var isLocal = host === "localhost" || host === "127.0.0.1" || host === "";
      if (!isLocal) {
        window.SF_SMART_PROXY = "https://sample-finder-proxy-dz098b.azurewebsites.net/api";
      }
    })();
  </script>
  <script src="app.js?v=20260717b"></script>
</body>
</html>
